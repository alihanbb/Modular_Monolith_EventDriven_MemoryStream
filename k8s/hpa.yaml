apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: modular-monolith-api
  namespace: modular-monolith-system
  labels:
    app.kubernetes.io/name: modular-monolith-api
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: modular-monolith-api
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
