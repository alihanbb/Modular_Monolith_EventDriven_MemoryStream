apiVersion: v1
kind: Service
metadata:
  name: modular-monolith-api
  namespace: modular-monolith-system
  labels:
    app.kubernetes.io/name: modular-monolith-api
    app.kubernetes.io/component: api
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: modular-monolith-api
  sessionAffinity: None
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
      nodePort: 30080
