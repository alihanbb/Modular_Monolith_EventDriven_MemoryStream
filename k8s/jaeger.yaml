apiVersion: apps/v1
kind: Deployment
metadata:
  name: modular-monolith-jaeger
  namespace: modular-monolith-system
  labels:
    app.kubernetes.io/name: modular-monolith-jaeger
    app.kubernetes.io/component: tracing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: modular-monolith-jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: modular-monolith-jaeger
        app.kubernetes.io/component: tracing
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:latest
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          ports:
            - containerPort: 16686  # UI
            - containerPort: 4317   # OTLP gRPC
            - containerPort: 4318   # OTLP HTTP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: modular-monolith-jaeger
  namespace: modular-monolith-system
  labels:
    app.kubernetes.io/name: modular-monolith-jaeger
    app.kubernetes.io/component: tracing
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: modular-monolith-jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
